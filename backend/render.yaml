services:
  - type: web
    name: spintrack-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: DATABASE_URL
        value: sqlite:///./spintrack.db
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
