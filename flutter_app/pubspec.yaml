name: flutter_app
description: "Full Track AI - Cricket Bowling Analysis App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  intl: ^0.19.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Camera & Video
  camera: ^0.11.0+2
  video_player: ^2.9.2
  google_mlkit_pose_detection: ^0.13.0

  # File Management
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.69.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/spintrack_logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/spintrack_logo.png"
  min_sdk_android: 21
